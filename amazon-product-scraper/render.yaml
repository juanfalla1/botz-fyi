services:
  - type: web
    name: smart-deals-scraper
    env: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: EXTRACT_TIMEOUT_MS
        value: 120000
